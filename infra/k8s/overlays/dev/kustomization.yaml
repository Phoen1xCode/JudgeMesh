apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: judgemesh

resources:
  - ../../base/submit-service
  - ../../base/judge-dispatcher
  - ../../base/judge-worker
  # TODO add gateway / user-service / problem-service

patches:
  - target: { kind: Deployment, name: submit-service }
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target: { kind: Deployment, name: judge-dispatcher }
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target: { kind: Deployment, name: judge-worker }
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
